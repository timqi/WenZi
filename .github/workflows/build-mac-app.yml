name: Build macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in spec
        run: |
          sed -i '' "s/'CFBundleVersion': '.*'/'CFBundleVersion': '${{ steps.version.outputs.VERSION }}'/" VoiceText.spec
          sed -i '' "s/'CFBundleShortVersionString': '.*'/'CFBundleShortVersionString': '${{ steps.version.outputs.VERSION }}'/" VoiceText.spec

      - name: Build app with PyInstaller
        env:
          CODESIGN_IDENTITY: '-'  # Ad-hoc signing in CI
        run: |
          uv run pyinstaller VoiceText.spec --clean --noconfirm

      - name: Create DMG
        run: |
          APP_PATH="dist/VoiceText.app"
          DMG_PATH="dist/VoiceText-${{ steps.version.outputs.VERSION }}-arm64.dmg"
          hdiutil create -volname "VoiceText" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoiceText ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/VoiceText-${{ steps.version.outputs.VERSION }}-arm64.dmg
